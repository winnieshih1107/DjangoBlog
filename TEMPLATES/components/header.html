<html>
    <head>
        <meta charset="utf-8">
        <title> Django CMS </title>
    </head>
    <body>
        <h1> Welcome to MyBlog </h>
        <hr>
        {{ posts }}
        {% for post in posts %}
            <h1> {{post.title}} </h1>
            <small> {{post.content}} </small>
            <h6> {{ post.slug }} | {{post.pub_date}} </h6> {% endfor %}

        <h3>現在時間: {{ now }}</h3>
    </body>
</html>
